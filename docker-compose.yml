services:
  kaztilshi:
    build: .
    container_name: kaztilshi-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_PATH=/app/data/kaztilshi.db
    volumes:
      - kaztilshi-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/engines"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy with SSL
  # Uncomment if you want HTTPS termination
  # nginx:
  #   image: nginx:alpine
  #   container_name: kaztilshi-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - kaztilshi

volumes:
  kaztilshi-data:
    driver: local
